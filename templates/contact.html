<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact – Khmer Legend Bits</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #0a0a0a;
      color: #fff;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 40px;
      gap: 40px;
    }

    nav .logo {
      font-size: 18px;
      font-weight: bold;
      color: #c9a227;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    nav .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .contact-wrapper {
      display: flex;
      height: 100vh;
      padding-top: 60px;
      margin-top: 0;
    }

    .panel {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      transform: scale(0.88) translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
      border-right: 2px solid rgba(201, 162, 39, 0.2);
    }

    .panel:last-child {
      border-right: none;
    }

    .panel.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .panel:nth-child(1) { transition-delay: 0.1s; }
    .panel:nth-child(2) { transition-delay: 0.28s; }
    .panel:nth-child(3) { transition-delay: 0.46s; }

    .panel img.bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .panel::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      box-shadow:
        inset 0 0 60px 30px rgba(0,0,0,0.85),
        inset 0 0 20px 8px rgba(80,30,0,0.6);
    }

    .panel .tint {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.82) 0%,
        rgba(0,0,0,0.25) 50%,
        rgba(0,0,0,0.45) 100%
      );
    }

    .info {
      position: absolute;
      bottom: 32px;
      left: 28px;
      z-index: 4;
      max-width: 85%;
    }

    .info .name {
      font-size: 20px;
      font-weight: bold;
      color: #c9a227;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      margin-bottom: 6px;
    }

    .info .role {
      font-size: 12px;
      color: #d4c08a;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }

    .info .tel {
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }

    .info .ember-line {
      width: 40px;
      height: 2px;
      background: linear-gradient(to right, #c9a227, #ff4500, transparent);
      margin-bottom: 10px;
      border-radius: 2px;
    }

    .panel:hover img.bg {
      transform: scale(1.04);
      transition: transform 0.5s ease;
      filter: brightness(1.08);
    }

    .panel img.bg {
      transition: transform 0.5s ease, filter 0.5s ease;
    }
  </style>
</head>
<body>

  <nav>
    <span class="logo">🏯 Khmer Legend Bits</span>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
    </div>
  </nav>

  <div class="contact-wrapper">

    <div class="panel">
      <img class="bg" src="{{ url_for('static', filename='nara_contact.PNG') }}" alt="Sreuv Channara" />
      <div class="tint"></div>
      <div class="info">
        <div class="ember-line"></div>
        <div class="name">Sreuv Channara</div>
        <div class="role">Software Development · AUPP Freshman</div>
        <div class="tel">📞 (+855) 081 678 665</div>
      </div>
    </div>

    <div class="panel">
      <img class="bg" src="{{ url_for('static', filename='makarain_contact.JPG') }}" alt="Sorn Makarain" />
      <div class="tint"></div>
      <div class="info">
        <div class="ember-line"></div>
        <div class="name">Sorn Makarain</div>
        <div class="role">Cybersecurity · AUPP Freshman</div>
        <div class="tel">📞 (+855) 017 300 108</div>
      </div>
    </div>

    <div class="panel">
      <img class="bg" src="{{ url_for('static', filename='mony_contact.JPG') }}" alt="So Sothamonny" />
      <div class="tint"></div>
      <div class="info">
        <div class="ember-line"></div>
        <div class="name">So Sothamonny</div>
        <div class="role">Software Development · AUPP Freshman</div>
        <div class="tel">📞 (+855) 076 603 0668</div>
      </div>
    </div>

  </div>

  <script>
    function triggerAnimation() {
      const panels = document.querySelectorAll('.panel');
      setTimeout(() => {
        panels.forEach(p => p.classList.add('visible'));
      }, 80);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', triggerAnimation);
    } else {
      triggerAnimation();
    }
  </script>

</body>
</html>
